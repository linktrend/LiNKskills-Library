name: security-gate
on:
  pull_request:
  push:
    branches: [main]
permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: |
          python -m pip install --upgrade pip
          pip install -r services/logic-engine/requirements.txt
      - run: python -m unittest discover -s services/logic-engine/tests -v
      - run: bash scripts/ci-check-frontmatter.sh
      - uses: returntocorp/semgrep-action@v1
        with:
          config: p/owasp-top-ten
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          python -m pip install pip-audit
          pip-audit -r services/logic-engine/requirements.txt
